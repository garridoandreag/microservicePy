apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservice-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: microservice
      version: v2
  template:
    metadata:
      labels:
        app: microservice
        version: v2
    spec:
      containers:
      - name: microservice
        image: ghcr.io/garridoandreag/microservicepy:v2
        ports:
        - containerPort: 5000