apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounts-canary
  namespace: microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: accounts
      track: canary
  template:
    metadata:
      labels:
        app: accounts
        track: canary
        version: v2
    spec:
      containers:
        - name: accounts
          image: ghcr.io/garridoandreag/microservicepy:v2
          imagePullPolicy: Always
          env:
            - name: APP_VERSION
              value: "v2"
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10