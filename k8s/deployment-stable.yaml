apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservice-stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: microservice
      version: v1
  template:
    metadata:
      labels:
        app: microservice
        version: v1
    spec:
      containers:
      - name: microservice
        image: ghcr.io/garridoandreag/microservicepy:latest
        ports:
        - containerPort: 5000

